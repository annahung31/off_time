<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>下班倒數</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --accent: #111111;
      --accent-dim: rgba(0,0,0,0.06);
      --accent-mid: rgba(0,0,0,0.2);
      --text: #111111;
      --muted: #888888;
      --danger: #111111;
      --warn: #111111;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
    }



    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-dot.running {
      background: #111111;
      box-shadow: none;
      animation: pulse 2s ease infinite;
    }
    .status-dot.done {
      background: #111111;
      box-shadow: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Setup Panel ── */
    #setup-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadeIn 0.6s ease;
    }

    .panel-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .title-block {
      text-align: center;
    }
    .title-block h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .title-block h1 span {
      color: var(--text);
    }
    .title-block p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .input-group label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .time-input {
      width: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1.6rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    .time-input::-webkit-inner-spin-button,
    .time-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .time-input:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }

    .colon {
      font-family: 'DM Mono', monospace;
      font-size: 2rem;
      color: var(--muted);
      padding-bottom: 0.6rem;
      align-self: flex-end;
    }

    .preset-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-btn:hover {
      border-color: #111;
      color: #111;
      background: #f0f0f0;
    }

    .start-btn {
      margin-top: 0.5rem;
      padding: 1rem 3rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .start-btn:active { transform: translateY(0); }

    /* ── Timer Panel ── */
    #timer-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      animation: fadeIn 0.6s ease;
      width: 100%;
      max-width: 640px;
    }

    .timer-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .end-time-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .end-time-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      color: var(--text);
    }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: min(320px, 72vw);
      height: min(320px, 72vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 6;
    }

    .ring-prog {
      fill: none;
      stroke: #111111;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    .ring-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      text-align: center;
    }

    .time-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1;
    }



    .time-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.18em;
    }

    /* Progress bar */
    .progress-bar-wrap {
      width: 100%;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .progress-meta span {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 1s linear;
      width: 0%;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 1rem;
    }

    .ctrl-btn {
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    .ctrl-btn:hover { border-color: #111; background: #111; color: #fff; }
    .ctrl-btn.primary {
      background: #f0f0f0;
      border-color: #ccc;
      color: #111;
    }
    .ctrl-btn.primary:hover {
      background: #111;
      color: #fff;
    }

    /* Done overlay */
    #done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      animation: fadeIn 0.4s ease;
    }
    #done-overlay.show { display: flex; }

    .done-emoji { font-size: 4rem; }
    .done-title {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--text);
    }
    .done-sub {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }
    .done-restart {
      margin-top: 1rem;
      padding: 0.9rem 2.5rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .done-restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Meme ── */
    .meme-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      animation: fadeIn 0.8s ease;
    }
    .meme-img {
      width: min(280px, 70vw);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      display: block;
    }
    .meme-caption {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">⬡ Work Timer</div>
  <div class="status-dot" id="dot"></div>
</div>

<div class="app">

  <!-- Setup -->
  <div id="setup-panel">
    <div class="title-block">
      <div class="panel-label" style="margin-bottom:0.8rem;">設定上班時長</div>
      <h1>距離<span>下班</span><br>還有多久？</h1>
      <p>輸入今天的上班時數，開始倒數</p>
    </div>

    <div class="input-group">
      <label>上班時長（時：分）</label>
      <div class="input-row">
        <div class="input-group">
          <input class="time-input" type="number" id="input-h" min="0" max="23" value="8" placeholder="08">
          <label>小時</label>
        </div>
        <div class="colon">:</div>
        <div class="input-group">
          <input class="time-input" type="number" id="input-m" min="0" max="59" value="0" placeholder="00">
          <label>分鐘</label>
        </div>
      </div>
    </div>

    <div class="preset-row">
      <button class="preset-btn" onclick="setPreset(4,0)">4 小時</button>
      <button class="preset-btn" onclick="setPreset(6,0)">6 小時</button>
      <button class="preset-btn" onclick="setPreset(8,0)">8 小時</button>
      <button class="preset-btn" onclick="setPreset(8,30)">8.5 小時</button>
      <button class="preset-btn" onclick="setPreset(9,0)">9 小時</button>
    </div>

    <button class="start-btn" onclick="startTimer()">開始倒數 →</button>
  </div>

  <!-- Timer -->
  <div id="timer-panel">
    <div class="timer-top">
      <div class="end-time-label">下班時間</div>
      <div class="end-time-value" id="end-time-label">—</div>
    </div>

    <div class="ring-wrap">
      <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-prog" id="ring" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="553"/>
      </svg>
      <div class="ring-inner">
        <div class="time-display" id="display">00:00:00</div>
        <div class="time-sub">剩餘時間</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span id="elapsed-label">已過 0%</span>
        <span id="remain-label">剩餘 100%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">暫停</button>
      <button class="ctrl-btn" onclick="resetTimer()">重設</button>
    </div>

<!-- Done -->
<div id="done-overlay">
  <div class="done-emoji">🎉</div>
  <div class="done-title">下班了！</div>
  <div class="done-sub">今天辛苦了，好好休息吧。</div>
  <button class="done-restart" onclick="resetTimer()">再來一次</button>
</div>

<script>
  let totalSeconds = 0;
  let remaining = 0;
  let interval = null;
  let paused = false;
  const CIRC = 2 * Math.PI * 88; // ≈ 552.92

  const display    = document.getElementById('display');
  const ring       = document.getElementById('ring');
  const progFill   = document.getElementById('prog-fill');
  const dot        = document.getElementById('dot');
  const pauseBtn   = document.getElementById('pause-btn');
  const elapsedLbl = document.getElementById('elapsed-label');
  const remainLbl  = document.getElementById('remain-label');
  const endTimeLbl = document.getElementById('end-time-label');
  const setupPanel = document.getElementById('setup-panel');
  const timerPanel = document.getElementById('timer-panel');
  const doneOverlay= document.getElementById('done-overlay');

  function setPreset(h, m) {
    document.getElementById('input-h').value = h;
    document.getElementById('input-m').value = m;
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function fmt(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function startTimer() {
    const h = parseInt(document.getElementById('input-h').value) || 0;
    const m = parseInt(document.getElementById('input-m').value) || 0;
    totalSeconds = h * 3600 + m * 60;
    if (totalSeconds <= 0) { alert('請輸入有效時長！'); return; }

    remaining = totalSeconds;

    // Compute end time
    const end = new Date(Date.now() + totalSeconds * 1000);
    endTimeLbl.textContent = end.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });

    setupPanel.style.display = 'none';
    timerPanel.style.display = 'flex';
    dot.classList.add('running');

    tick();
    interval = setInterval(tick, 1000);
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(interval);
      interval = null;
      done();
      return;
    }

    const pct = 1 - remaining / totalSeconds;
    const elapsed = totalSeconds - remaining;

    // display
    display.textContent = fmt(remaining);



    // ring
    ring.style.strokeDashoffset = CIRC * (1 - pct);

    // progress bar
    const pctRound = Math.round(pct * 100);
    progFill.style.width = pctRound + '%';
    elapsedLbl.textContent = `已過 ${pctRound}%`;
    remainLbl.textContent  = `剩餘 ${100 - pctRound}%`;

    remaining--;
  }

  function togglePause() {
    if (!paused) {
      clearInterval(interval);
      interval = null;
      paused = true;
      pauseBtn.textContent = '繼續';
      dot.classList.remove('running');
    } else {
      paused = false;
      pauseBtn.textContent = '暫停';
      dot.classList.add('running');
      interval = setInterval(tick, 1000);
    }
  }

  function resetTimer() {
    clearInterval(interval);
    interval = null;
    paused = false;
    remaining = 0;
    dot.classList.remove('running','done');
    doneOverlay.classList.remove('show');
    timerPanel.style.display = 'none';
    setupPanel.style.display = 'flex';
    pauseBtn.textContent = '暫停';
    display.textContent = '00:00:00';
    ring.style.strokeDashoffset = CIRC;
    progFill.style.width = '0%';
  }

  function done() {
    dot.classList.remove('running');
    dot.classList.add('done');
    doneOverlay.classList.add('show');
    // Try to notify
    if (Notification.permission === 'granted') {
      new Notification('🎉 下班了！', { body: '今天辛苦了，回家!!!' });
    }
  }

  // Request notification permission silently
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
</script>
